<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 420" width="160" height="420">

  <!--
    Ghost base model.
    Classic sheet ghost: round dome top, straight sides, three downward bumps at bottom.
    Hollow eye sockets, open mouth. Inner fold lines + trailing wisps for wispy feel.
    Faces left via translate(160,0) scale(-1,1).

    Draw order:
      1. Main body (white fill)
      2. Eye sockets + mouth (black fill)
      3. Inner fold lines (over white, low opacity)
      4. Trailing wisps (below body)
  -->

  <g id="ghost" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"
     transform="translate(160,0) scale(-1,1)">

    <!-- ── Main body ─────────────────────────────────────────────── -->
    <!-- Round dome top at y=65, widens to full width by y=115,      -->
    <!-- flows straight down to y=320, three downward bumps to y=355 -->
    <path d="
      M 78,65
      C 108,62  126,85   126,115
      C 126,165 122,245  122,320
      C 118,355  96,355   93,320
      C  90,355  67,355   64,320
      C  61,355  38,355   34,320
      C  34,245  30,165   30,115
      C  30,85   48,62    78,65 Z
    "/>

    <!-- ── Eye sockets ───────────────────────────────────────────── -->
    <!-- Slightly offset toward facing side (pre-flip right = forward) -->
    <ellipse cx="93" cy="122" rx="12" ry="15" fill="black" stroke="none"/>
    <ellipse cx="63" cy="122" rx="12" ry="15" fill="black" stroke="none"/>

    <!-- ── Mouth ──────────────────────────────────────────────────── -->
    <ellipse cx="78" cy="160" rx="8" ry="6" fill="black" stroke="none"/>

    <!-- ── Inner fold lines (billowing sheet) ────────────────────── -->
    <path d="M 107,118 C 112,165 108,228 112,288"
          fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.22"/>
    <path d="M  50,118 C  45,165  49,228  45,288"
          fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.22"/>

    <!-- ── Trailing wisps from the bottom valleys ─────────────────── -->
    <!-- Centre valley (between bumps 1 and 2) -->
    <path d="M 93,335 C 93,358  91,372  88,388"
          fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Left valley (between bumps 2 and 3) -->
    <path d="M 64,335 C 64,358  62,372  60,388"
          fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Far right edge wisp -->
    <path d="M 122,325 C 124,348 122,365 119,380"
          fill="none" stroke="black" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
    <!-- Far left edge wisp -->
    <path d="M  34,325 C  32,348  34,365  37,380"
          fill="none" stroke="black" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>

  </g>

</svg>
