<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 420" width="160" height="420">

  <!--
    Skeleton base model.
    Humanoid proportions, bare bones: skull with sockets/teeth, ribcage + spine,
    pelvis, long bones with joint knobs.
    Draw order: back limbs → ribcage/pelvis → skull → front limbs → joints/details.
    Faces left via translate(160,0) scale(-1,1).
  -->

  <g id="skeleton" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"
     transform="translate(160,0) scale(-1,1)">

    <!-- ══════════════════════════════════════
         BACK ARM (creature's left, screen-right)
         ══════════════════════════════════════ -->

    <!-- Humerus -->
    <line x1="110" y1="112" x2="122" y2="162" stroke="black" stroke-width="9"  stroke-linecap="round" fill="none"/>
    <line x1="110" y1="112" x2="122" y2="162" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Forearm -->
    <line x1="122" y1="162" x2="117" y2="232" stroke="black" stroke-width="7"  stroke-linecap="round" fill="none"/>
    <line x1="122" y1="162" x2="117" y2="232" stroke="white" stroke-width="4"  stroke-linecap="round" fill="none"/>
    <!-- Hand mitt -->
    <ellipse cx="116" cy="243" rx="8" ry="10" fill="white" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         BACK LEG
         ══════════════════════════════════════ -->

    <!-- Femur -->
    <line x1="90" y1="262" x2="89" y2="326" stroke="black" stroke-width="11" stroke-linecap="round" fill="none"/>
    <line x1="90" y1="262" x2="89" y2="326" stroke="white" stroke-width="7"  stroke-linecap="round" fill="none"/>
    <!-- Tibia -->
    <line x1="89" y1="326" x2="88" y2="390" stroke="black" stroke-width="9"  stroke-linecap="round" fill="none"/>
    <line x1="89" y1="326" x2="88" y2="390" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Foot (toe faces screen-left, matches humanoid, shifted to tibia x=88) -->
    <path d="M 95,389 L 81,389 C 75,389 73,400 79,410 C 85,413 93,411 98,407 C 100,403 98,394 95,389 Z"/>

    <!-- ══════════════════════════════════════
         RIBCAGE + SPINE + CLAVICLES
         ══════════════════════════════════════ -->

    <!-- Spine (dotted) -->
    <line x1="78" y1="80" x2="78" y2="246" stroke="#ccc" stroke-width="2.5"
          stroke-linecap="round" stroke-dasharray="3,4" fill="none"/>

    <!-- Clavicles -->
    <path d="M 78,96 C 88,94 102,100 112,108" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 78,96 C 68,94 54,100 44,108"  fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Ribs right side -->
    <path d="M 78,108 C 90,101 108,104 116,110" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,122 C 91,114 112,116 119,124" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,136 C 91,128 113,130 120,138" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,150 C 91,142 112,143 119,152" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,164 C 90,156 109,158 116,167" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,177 C 88,170 105,172 111,180" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>

    <!-- Sternum -->
    <path d="M 116,110 C 119,135 120,155 111,180" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>

    <!-- Ribs left side -->
    <path d="M 78,108 C 66,101 48,104 40,110" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,122 C 65,114 44,116 37,124" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,136 C 65,128 43,130 36,138" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,150 C 65,142 44,143 37,152" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,164 C 66,156 47,158 40,167" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,177 C 68,170 51,172 45,180" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════
         PELVIS
         ══════════════════════════════════════ -->
    <path d="
      M 52,242 C 48,234 56,226 78,224 C 100,226 108,234 104,242
      L 108,256 C 106,268 98,272 90,268
      C 86,276 70,276 66,268
      C 58,272 50,268 48,256 Z
    "/>

    <!-- ══════════════════════════════════════
         SKULL
         ══════════════════════════════════════ -->

    <!-- Cervical vertebrae -->
    <circle cx="78" cy="81" r="4"   fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="78" cy="89" r="3.5" fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="78" cy="97" r="3"   fill="white" stroke="black" stroke-width="1.5"/>

    <!-- Cranium -->
    <ellipse cx="78" cy="46" rx="28" ry="30"/>

    <!-- Cheekbone hint (forward / pre-flip right) -->
    <path d="M 98,56 C 104,60 106,68 102,74" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eye sockets -->
    <ellipse cx="91" cy="40" rx="10" ry="11" fill="black" stroke="none"/>
    <ellipse cx="63" cy="40" rx="10" ry="11" fill="black" stroke="none"/>

    <!-- Nose cavity -->
    <path d="M 76,58 C 74,64 77,67 78,65 C 79,67 82,64 80,58 Z" fill="black" stroke="none"/>

    <!-- Grinning teeth (upper jaw edge) -->
    <rect x="69"  y="71" width="4"   height="5.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>
    <rect x="74"  y="70" width="4.5" height="6.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>
    <rect x="79"  y="70" width="4.5" height="6.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>
    <rect x="84"  y="70" width="4.5" height="6.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>
    <rect x="89"  y="71" width="4.5" height="5.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>
    <rect x="94"  y="72" width="3.5" height="4.5" rx="0.5" fill="white" stroke="black" stroke-width="0.8"/>

    <!-- ══════════════════════════════════════
         FRONT ARM (creature's right, screen-left)
         ══════════════════════════════════════ -->

    <!-- Humerus -->
    <line x1="46"  y1="112" x2="36"  y2="162" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="46"  y1="112" x2="36"  y2="162" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Forearm -->
    <line x1="36"  y1="162" x2="41"  y2="232" stroke="black" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="36"  y1="162" x2="41"  y2="232" stroke="white" stroke-width="4"   stroke-linecap="round" fill="none"/>
    <!-- Hand mitt -->
    <ellipse cx="41" cy="243" rx="8" ry="10" fill="white" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         FRONT LEG
         ══════════════════════════════════════ -->

    <!-- Femur -->
    <line x1="66"  y1="262" x2="67"  y2="326" stroke="black" stroke-width="11"  stroke-linecap="round" fill="none"/>
    <line x1="66"  y1="262" x2="67"  y2="326" stroke="white" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <!-- Tibia -->
    <line x1="67"  y1="326" x2="66"  y2="390" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="67"  y1="326" x2="66"  y2="390" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Foot (toe faces screen-left, matches humanoid, shifted to tibia x=66) -->
    <path d="M 73,389 L 59,389 C 53,389 51,400 57,410 C 63,413 71,411 76,407 C 78,403 76,394 73,389 Z"/>

    <!-- ══════════════════════════════════════
         JOINT KNOBS (drawn last, on top)
         ══════════════════════════════════════ -->

    <!-- Shoulders -->
    <circle cx="110" cy="112" r="7"  fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="46"  cy="112" r="7"  fill="white" stroke="black" stroke-width="1.5"/>
    <!-- Elbows -->
    <circle cx="122" cy="162" r="6"  fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="36"  cy="162" r="6"  fill="white" stroke="black" stroke-width="1.5"/>
    <!-- Hips -->
    <circle cx="90"  cy="262" r="7"  fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="66"  cy="262" r="7"  fill="white" stroke="black" stroke-width="1.5"/>
    <!-- Knees -->
    <circle cx="89"  cy="326" r="7"  fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="67"  cy="326" r="7"  fill="white" stroke="black" stroke-width="1.5"/>

  </g>

</svg>
