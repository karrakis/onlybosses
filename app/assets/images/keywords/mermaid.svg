<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 220 460" width="160" height="420">

  <!--
    Mermaid base model.
    Upper body frontal, tail sweeps sideways behind her (screen-right in pre-flip coords).
    Draw order: hair (back) → back arm → caudal fin → body+tail → scales →
                head → front arm → joints.
    Faces left via translate(160,0) scale(-1,1).
  -->

  <g id="mermaid" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"
     transform="translate(160,0) scale(-1,1)">

    <!-- ══════════════════════════════════════
         HAIR (behind head, drawn first)
         Green strands that drape over the crown and fall down the sides.
         ══════════════════════════════════════ -->
    <!-- Crown drape — sweeps over the top of the head -->
    <path d="M 96,14 C 84,8 68,8 58,12 C 46,17 38,28 34,42 C 30,56 34,72 42,82 C 46,88 52,92 58,94"
          fill="none" stroke="#2d8e3e" stroke-width="8" stroke-linecap="round"/>
    <path d="M 94,12 C 80,6 66,7 56,12 C 44,18 36,32 36,48 C 36,62 42,76 52,86 C 56,90 62,94 68,96"
          fill="none" stroke="#2d8e3e" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Over-crown highlight strand -->
    <path d="M 90,10 C 78,6 66,8 60,16 C 54,24 53,38 56,50 C 60,62 66,74 74,82"
          fill="none" stroke="#3aaa50" stroke-width="3" stroke-linecap="round"/>
    <!-- Short front strand falling over forehead -->
    <path d="M 86,12 C 88,20 90,28 88,36"
          fill="none" stroke="#2d8e3e" stroke-width="4" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════
         BACK ARM (creature's left, screen-right pre-flip)
         ══════════════════════════════════════ -->
    <line x1="108" y1="90" x2="120" y2="142" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="108" y1="90" x2="120" y2="142" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <line x1="120" y1="142" x2="115" y2="210" stroke="black" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="120" y1="142" x2="115" y2="210" stroke="white" stroke-width="4"   stroke-linecap="round" fill="none"/>
    <ellipse cx="114" cy="221" rx="8" ry="10" fill="white" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         CAUDAL FIN
         Tail sweeps screen-right (pre-flip = positive x); fin fans out there.
         Upper lobe fans up-right, lower lobe fans down-right.
         ══════════════════════════════════════ -->
    <!-- Upper fin lobe -->
    <path d="M 124,366 C 136,352 158,338 162,320 C 154,334 148,360 134,378 L 122,384 Z"
          fill="white" stroke="black" stroke-width="2"/>
    <!-- Lower fin lobe -->
    <path d="M 128,382 C 144,388 166,376 170,360 C 158,372 146,392 128,400 L 118,396 Z"
          fill="white" stroke="black" stroke-width="2"/>

    <!-- ══════════════════════════════════════
         BODY + TAIL
         Upper body: normal frontal torso.
         Below hips (~y=240) the tail curves right, narrowing to a peduncle.
         ══════════════════════════════════════ -->
    <path d="
      M 110,82
      C 116,106 118,152 114,194
      C 110,216 102,232 98,242
      C 104,258 116,282 124,316
      C 128,336 128,356 124,366
      C 122,372 118,382 118,384
      C 116,388 122,394 128,400
      C 122,402 112,398 108,390
      C 104,382 100,372 98,360
      C 92,332 84,302 80,278
      C 76,262 72,250 68,244
      C 62,232 52,216 46,194
      C 40,152 42,106 46,82
      C 52,72 62,64 78,64
      C 94,64 104,72 110,82 Z
    " fill="white" stroke="black" stroke-width="2"/>

    <!-- Hip / scale belt transition -->
    <path d="M 68,244 C 76,250 98,250 104,244"
          fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════
         SCALE LINES on tail (follow the curve rightward)
         ══════════════════════════════════════ -->
    <path d="M 72,272 C 84,266 102,268 112,276"  fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <path d="M 80,300 C 92,294 110,296 120,306"  fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <path d="M 88,328 C 100,320 116,322 124,332" fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <path d="M 96,354 C 106,348 118,350 124,358" fill="none" stroke="black" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

    <!-- Fin vein lines -->
    <path d="M 124,366 C 140,352 158,338 162,322" fill="none" stroke="black" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <path d="M 122,374 C 136,362 154,348 158,334" fill="none" stroke="black" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <path d="M 128,382 C 144,388 164,378 168,362" fill="none" stroke="black" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <path d="M 122,390 C 138,396 156,388 162,374" fill="none" stroke="black" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>

    <!-- ══════════════════════════════════════
         HEAD
         ══════════════════════════════════════ -->
    <!-- Cranium -->
    <ellipse cx="78" cy="38" rx="24" ry="26"/>

    <!-- Cheekbone hint -->
    <path d="M 98,50 C 104,54 106,62 102,68"
          fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eyebrow -->
    <path d="M 84,25 C 88,22 95,22 99,25"
          fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>

    <!-- Eye -->
    <ellipse cx="91" cy="34" rx="7" ry="6" fill="black" stroke="none"/>
    <ellipse cx="89" cy="33" rx="2.5" ry="2" fill="white" stroke="none"/>

    <!-- Nose -->
    <circle cx="100" cy="42" r="1.3" fill="black" stroke="none"/>

    <!-- Smile -->
    <path d="M 96,50 C 100,56 108,56 112,52"
          fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════
         FRONT ARM (creature's right, screen-left pre-flip)
         ══════════════════════════════════════ -->
    <line x1="48"  y1="90" x2="36"  y2="142" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="48"  y1="90" x2="36"  y2="142" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <line x1="36"  y1="142" x2="41" y2="210" stroke="black" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="36"  y1="142" x2="41" y2="210" stroke="white" stroke-width="4"   stroke-linecap="round" fill="none"/>
    <ellipse cx="41" cy="221" rx="8" ry="10" fill="white" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         JOINT KNOBS (drawn last)
         ══════════════════════════════════════ -->
    <circle cx="108" cy="90"  r="7" fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="48"  cy="90"  r="7" fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="120" cy="142" r="6" fill="white" stroke="black" stroke-width="1.5"/>
    <circle cx="36"  cy="142" r="6" fill="white" stroke="black" stroke-width="1.5"/>

  </g>

</svg>
