<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>

    <!--
      Feather unit matching feather.svg proportions.
      Origin = quill tip at (0,0). Tip at (0,-207).
      Peak half-width: 35px at y=-75 (~30% from base y=0 toward tip y=-207).
      Barb curves: M 0,y  C +L*.25,y-L*.30  +L*.60,y+L*.05  +L*.85,y+L*.10
      No vane fill — hairline strokes only for layered weave effect.
    -->
    <g id="f">

      <!-- Rachis -->
      <rect x="-1"   y="-205" width="2"   height="207" rx="1" fill="#8b6014"/>
      <rect x="-0.3" y="-205" width="0.7" height="207" rx="0.35" fill="#d4a040" opacity="0.55"/>
      <!-- Quill nub -->
      <path d="M -1.5,0 Q 0,7 1.5,0 Z" fill="#c8963c"/>

      <!-- Yellow barbs  y=0 → –50  (growing to peak, L=20..34) -->
      <g stroke="#f5c800" stroke-width="0.9" fill="none" stroke-linecap="round">
        <!-- y=0   L=20 -->
        <path d="M 0,0   C  5,-6    12,1    17,1"/>
        <path d="M 0,0   C -5,-6   -12,1   -17,1"/>
        <!-- y=-10  L=24 -->
        <path d="M 0,-10 C  6,-17   14,-9   20,-9"/>
        <path d="M 0,-10 C -6,-17  -14,-9  -20,-9"/>
        <!-- y=-20  L=28 -->
        <path d="M 0,-20 C  7,-28   17,-19  24,-19"/>
        <path d="M 0,-20 C -7,-28  -17,-19 -24,-19"/>
        <!-- y=-30  L=32 -->
        <path d="M 0,-30 C  8,-39   19,-29  27,-28.5"/>
        <path d="M 0,-30 C -8,-39  -19,-29 -27,-28.5"/>
        <!-- y=-40  L=34 -->
        <path d="M 0,-40 C  9,-50   20,-39  29,-38.5"/>
        <path d="M 0,-40 C -9,-50  -20,-39 -29,-38.5"/>
        <!-- y=-50  L=35 -->
        <path d="M 0,-50 C  9,-60   21,-49  30,-48.5"/>
        <path d="M 0,-50 C -9,-60  -21,-49 -30,-48.5"/>
      </g>

      <!-- Green barbs  y=–60 → –120  (peak ±35 at –75, then tapering) -->
      <g stroke="#3dba55" stroke-width="1.1" fill="none" stroke-linecap="round">
        <!-- y=-60   L=35 -->
        <path d="M 0,-60  C  9,-70   21,-59  30,-58.5"/>
        <path d="M 0,-60  C -9,-70  -21,-59 -30,-58.5"/>
        <!-- y=-70   L=35  (approaching peak) -->
        <path d="M 0,-70  C  9,-80   21,-69  30,-68.5"/>
        <path d="M 0,-70  C -9,-80  -21,-69 -30,-68.5"/>
        <!-- y=-80   L=35  PEAK -->
        <path d="M 0,-80  C  9,-90   21,-79  30,-78.5"/>
        <path d="M 0,-80  C -9,-90  -21,-79 -30,-78.5"/>
        <!-- y=-90   L=34 -->
        <path d="M 0,-90  C  9,-100  20,-89  29,-88.5"/>
        <path d="M 0,-90  C -9,-100 -20,-89 -29,-88.5"/>
        <!-- y=-100  L=32 -->
        <path d="M 0,-100 C  8,-110  19,-99  27,-98.5"/>
        <path d="M 0,-100 C -8,-110 -19,-99 -27,-98.5"/>
        <!-- y=-110  L=30 -->
        <path d="M 0,-110 C  8,-120  18,-109 26,-108.5"/>
        <path d="M 0,-110 C -8,-120 -18,-109-26,-108.5"/>
        <!-- y=-120  L=28 -->
        <path d="M 0,-120 C  7,-130  17,-119 24,-118.5"/>
        <path d="M 0,-120 C -7,-130 -17,-119-24,-118.5"/>
      </g>

      <!-- Red barbs  y=–130 → –200  (shrinking rapidly to wisp) -->
      <g stroke="#e53030" stroke-width="0.8" fill="none" stroke-linecap="round">
        <!-- y=-130  L=24 -->
        <path d="M 0,-130 C  6,-140  14,-129 20,-128.5"/>
        <path d="M 0,-130 C -6,-140 -14,-129-20,-128.5"/>
        <!-- y=-140  L=21 -->
        <path d="M 0,-140 C  5,-150  13,-139 18,-138.5"/>
        <path d="M 0,-140 C -5,-150 -13,-139-18,-138.5"/>
        <!-- y=-150  L=16 -->
        <path d="M 0,-150 C  4,-158  10,-149 14,-148.5"/>
        <path d="M 0,-150 C -4,-158 -10,-149-14,-148.5"/>
        <!-- y=-160  L=12 -->
        <path d="M 0,-160 C  3,-168   7,-159 10,-158.5"/>
        <path d="M 0,-160 C -3,-168  -7,-159-10,-158.5"/>
        <!-- y=-170  L=8 -->
        <path d="M 0,-170 C  2,-177   5,-169  7,-168.5"/>
        <path d="M 0,-170 C -2,-177  -5,-169 -7,-168.5"/>
        <!-- y=-180  L=5 -->
        <path d="M 0,-180 C  1,-186   3,-179  4,-178.5"/>
        <path d="M 0,-180 C -1,-186  -3,-179 -4,-178.5"/>
        <!-- y=-190  L=2.5 -->
        <path d="M 0,-190 C  0.6,-195  1.5,-189  2,-188.5" stroke-width="0.6"/>
        <path d="M 0,-190 C -0.6,-195 -1.5,-189 -2,-188.5" stroke-width="0.6"/>
        <!-- y=-200  wisp -->
        <path d="M 0,-200 C  0.3,-204  0.6,-200  0.7,-200" stroke-width="0.5"/>
        <path d="M 0,-200 C -0.3,-204 -0.6,-200 -0.7,-200" stroke-width="0.5"/>
      </g>

    </g>

  </defs>

  <rect width="760" height="460" fill="#16161e"/>

  <!-- Faint guide arc -->
  <path d="M 60,280 C 100,40 480,20 640,190"
        fill="none" stroke="#6644aa" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.25"/>

