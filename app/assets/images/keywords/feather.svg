<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 250" width="100" height="250">
  <g id="feather">

    <!-- Quill point (calamus tip at base) -->
    <path id="quill" d="M 49,225 Q 49.2,233 50,242 Q 50.8,233 51,225 Z" fill="#c8963c"/>

    <!-- Stem (rachis): flat brown with a narrow highlight strip for depth -->
    <rect id="stem" x="49" y="14" width="2" height="211" rx="1" fill="#8b6014"/>
    <rect      x="49.4" y="14" width="0.7" height="211" rx="0.35" fill="#d4a040" opacity="0.55"/>

    <!-- ─── Yellow barbs — base zone (i=0‥4, y=215→175) ─── -->
    <!-- Widths: 26, 29, 31, 33, 34  (growing toward peak) -->
    <!-- Each pair: right barb then left barb                -->
    <!-- Bezier formula: M 50,y  C 50+L*.25, y-L*.30  50+L*.60, y+L*.05  50+L*.85, y+L*.10 -->
    <g id="barbs-yellow" stroke="#f5c800" stroke-width="0.9" fill="none" stroke-linecap="round">
      <!-- i=0  y=215  L=26 -->
      <path d="M 50,215 C 56,207 66,218 72,218"/>
      <path d="M 50,215 C 44,207 34,218 28,218"/>
      <!-- i=1  y=205  L=29 -->
      <path d="M 50,205 C 57,196 67,206 75,208"/>
      <path d="M 50,205 C 43,196 33,206 25,208"/>
      <!-- i=2  y=195  L=31 -->
      <path d="M 50,195 C 58,186 69,197 76,198"/>
      <path d="M 50,195 C 42,186 31,197 24,198"/>
      <!-- i=3  y=185  L=33 -->
      <path d="M 50,185 C 58,175 70,187 78,188"/>
      <path d="M 50,185 C 42,175 30,187 22,188"/>
      <!-- i=4  y=175  L=34 -->
      <path d="M 50,175 C 59,165 70,177 79,178"/>
      <path d="M 50,175 C 41,165 30,177 21,178"/>
    </g>

    <!-- ─── Green barbs — mid zone, widest here (i=5‥10, y=165→115) ─── -->
    <!-- Widths: 35, 35, 35, 34, 32, 30  (peak at i=6, y=155)            -->
    <g id="barbs-green" stroke="#3dba55" stroke-width="1.1" fill="none" stroke-linecap="round">
      <!-- i=5  y=165  L=35 -->
      <path d="M 50,165 C 59,154 71,167 80,169"/>
      <path d="M 50,165 C 41,154 29,167 20,169"/>
      <!-- i=6  y=155  L=35  ← PEAK (~30% from base) -->
      <path d="M 50,155 C 59,144 71,157 80,159"/>
      <path d="M 50,155 C 41,144 29,157 20,159"/>
      <!-- i=7  y=145  L=35 -->
      <path d="M 50,145 C 59,134 71,147 80,149"/>
      <path d="M 50,145 C 41,134 29,147 20,149"/>
      <!-- i=8  y=135  L=34 -->
      <path d="M 50,135 C 59,125 70,137 79,138"/>
      <path d="M 50,135 C 41,125 30,137 21,138"/>
      <!-- i=9  y=125  L=32 -->
      <path d="M 50,125 C 58,115 69,127 77,128"/>
      <path d="M 50,125 C 42,115 31,127 23,128"/>
      <!-- i=10 y=115  L=30 -->
      <path d="M 50,115 C 58,106 68,117 76,118"/>
      <path d="M 50,115 C 42,106 32,117 24,118"/>
    </g>

    <!-- ─── Red barbs — tip zone (i=11‥16 + wisps, y=105→35) ─── -->
    <!-- Widths: 28, 24, 21, 16, 12, 6  (shrinking toward tip)    -->
    <g id="barbs-red" stroke="#e53030" stroke-width="0.8" fill="none" stroke-linecap="round">
      <!-- i=11 y=105  L=28 -->
      <path d="M 50,105 C 57,97 67,106 74,108"/>
      <path d="M 50,105 C 43,97 33,106 26,108"/>
      <!-- i=12 y=95   L=24 -->
      <path d="M 50,95 C 56,88 64,96 70,97"/>
      <path d="M 50,95 C 44,88 36,96 30,97"/>
      <!-- i=13 y=85   L=21 -->
      <path d="M 50,85 C 55,79 63,86 68,87"/>
      <path d="M 50,85 C 45,79 37,86 32,87"/>
      <!-- i=14 y=75   L=16 -->
      <path d="M 50,75 C 54,70 60,76 64,77"/>
      <path d="M 50,75 C 46,70 40,76 36,77"/>
      <!-- i=15 y=65   L=12 -->
      <path d="M 50,65 C 53,61 57,66 60,66"/>
      <path d="M 50,65 C 47,61 43,66 40,66"/>
      <!-- i=16 y=55   L=6 -->
      <path d="M 50,55 C 52,53 54,55 55,56"/>
      <path d="M 50,55 C 48,53 46,55 45,56"/>
      <!-- Tip wisps -->
      <path d="M 50,45 C 51,43 53,45 54,45" stroke-width="0.6"/>
      <path d="M 50,45 C 49,43 47,45 46,45" stroke-width="0.6"/>
      <path d="M 50,35 C 51,33 52,34 52,35" stroke-width="0.5"/>
      <path d="M 50,35 C 49,33 48,34 48,35" stroke-width="0.5"/>
    </g>

  </g>
</svg>
