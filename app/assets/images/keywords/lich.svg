<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -30 160 450" width="160" height="420">

  <defs>
    <!-- Pulsing red glow for eye orbs -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff4444"/>
      <stop offset="60%"  stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <filter id="redBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pulse animation -->
  <style>
    @keyframes eyePulse {
      0%,100% { opacity: 1; r: 7; }
      50%      { opacity: 0.55; r: 9; }
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 0.25; }
    }
    .eye-orb  { animation: eyePulse  2.2s ease-in-out infinite; }
    .eye-glow { animation: glowPulse 2.2s ease-in-out infinite; }
  </style>

  <g id="lich" fill="#555" stroke="black" stroke-width="2" stroke-linejoin="round"
     transform="translate(160,0) scale(-1,1)">

    <!-- ══════════════════════════════════════
         BACK ARM
         ══════════════════════════════════════ -->
    <line x1="110" y1="112" x2="122" y2="162" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="110" y1="112" x2="122" y2="162" stroke="#666"  stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <line x1="122" y1="162" x2="117" y2="232" stroke="black" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="122" y1="162" x2="117" y2="232" stroke="#666"  stroke-width="4"   stroke-linecap="round" fill="none"/>
    <ellipse cx="116" cy="243" rx="8" ry="10" fill="#555" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         BACK LEG
         ══════════════════════════════════════ -->
    <line x1="90" y1="262" x2="89" y2="326" stroke="black" stroke-width="11"  stroke-linecap="round" fill="none"/>
    <line x1="90" y1="262" x2="89" y2="326" stroke="#666"  stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="89" y1="326" x2="88" y2="390" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="89" y1="326" x2="88" y2="390" stroke="#666"  stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M 95,389 L 81,389 C 75,389 73,400 79,410 C 85,413 93,411 98,407 C 100,403 98,394 95,389 Z"/>

    <!-- ══════════════════════════════════════
         RIBCAGE + SPINE + CLAVICLES
         ══════════════════════════════════════ -->
    <line x1="78" y1="80" x2="78" y2="246" stroke="#777" stroke-width="2.5"
          stroke-linecap="round" stroke-dasharray="3,4" fill="none"/>

    <path d="M 78,96 C 88,94 102,100 112,108" fill="none" stroke="#777" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 78,96 C 68,94 54,100 44,108"  fill="none" stroke="#777" stroke-width="2.5" stroke-linecap="round"/>

    <path d="M 78,108 C 90,101 108,104 116,110" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,122 C 91,114 112,116 119,124" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,136 C 91,128 113,130 120,138" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,150 C 91,142 112,143 119,152" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,164 C 90,156 109,158 116,167" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 78,177 C 88,170 105,172 111,180" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"/>
    <path d="M 116,110 C 119,135 120,155 111,180" fill="none" stroke="#777" stroke-width="3" stroke-linecap="round"/>
    <path d="M 78,108 C 66,101 48,104 40,110" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,122 C 65,114 44,116 37,124" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,136 C 65,128 43,130 36,138" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,150 C 65,142 44,143 37,152" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,164 C 66,156 47,158 40,167" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 78,177 C 68,170 51,172 45,180" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════
         PELVIS
         ══════════════════════════════════════ -->
    <path d="
      M 52,242 C 48,234 56,226 78,224 C 100,226 108,234 104,242
      L 108,256 C 106,268 98,272 90,268
      C 86,276 70,276 66,268
      C 58,272 50,268 48,256 Z
    "/>

    <!-- ══════════════════════════════════════
         CRACKS — jagged red fissures
         ══════════════════════════════════════ -->
    <!-- Skull crack -->
    <polyline points="82,18 79,28 85,36 80,48 77,55" fill="none" stroke="#cc0000" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cranium-to-jaw crack -->
    <polyline points="94,32 90,42 96,52 92,66 96,74" fill="none" stroke="#cc0000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Torso crack (runs down through ribcage) -->
    <polyline points="85,100 82,115 88,130 83,148 89,165 84,183 88,200 83,220 87,240" fill="none" stroke="#cc0000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pelvis crack -->
    <polyline points="70,228 75,238 68,250 73,262 69,272" fill="none" stroke="#cc0000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Back femur crack -->
    <polyline points="91,270 88,290 93,310 89,325" fill="none" stroke="#cc0000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Front tibia crack -->
    <polyline points="68,330 71,350 66,370 70,390" fill="none" stroke="#cc0000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Back arm crack -->
    <polyline points="114,115 118,135 115,155 119,175 116,200" fill="none" stroke="#cc0000" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ══════════════════════════════════════
         SKULL
         ══════════════════════════════════════ -->
    <circle cx="78" cy="81" r="4"   fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="78" cy="89" r="3.5" fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="78" cy="97" r="3"   fill="#555" stroke="black" stroke-width="1.5"/>

    <ellipse cx="78" cy="46" rx="28" ry="30"/>
    <path d="M 98,56 C 104,60 106,68 102,74" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eye sockets (dark pits) -->
    <ellipse cx="91" cy="40" rx="10" ry="11" fill="#1a0000" stroke="none"/>
    <ellipse cx="63" cy="40" rx="10" ry="11" fill="#1a0000" stroke="none"/>

    <!-- Eye glow halos -->
    <circle class="eye-glow" cx="91" cy="40" r="12" fill="url(#eyeGlow)" stroke="none" filter="url(#redBloom)"/>
    <circle class="eye-glow" cx="63" cy="40" r="12" fill="url(#eyeGlow)" stroke="none" filter="url(#redBloom)"/>

    <!-- Eye orbs -->
    <circle class="eye-orb" cx="91" cy="40" r="7" fill="#dd2222" stroke="#ff6666" stroke-width="0.8" filter="url(#redBloom)"/>
    <circle class="eye-orb" cx="63" cy="40" r="7" fill="#dd2222" stroke="#ff6666" stroke-width="0.8" filter="url(#redBloom)"/>

    <!-- Nose cavity -->
    <path d="M 76,58 C 74,64 77,67 78,65 C 79,67 82,64 80,58 Z" fill="#333" stroke="none"/>

    <!-- Teeth (dark gray on lich) -->
    <rect x="69"  y="71" width="4"   height="5.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>
    <rect x="74"  y="70" width="4.5" height="6.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>
    <rect x="79"  y="70" width="4.5" height="6.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>
    <rect x="84"  y="70" width="4.5" height="6.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>
    <rect x="89"  y="71" width="4.5" height="5.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>
    <rect x="94"  y="72" width="3.5" height="4.5" rx="0.5" fill="#888" stroke="#444" stroke-width="0.8"/>

    <!-- ══════════════════════════════════════
         CROWN (jagged, drawn over skull)
         ══════════════════════════════════════ -->
    <!-- Band base: sits at y=18 over the skull top y≈16 -->
    <path d="
      M 52,22
      L 52,10 L 58,18 L 64,4  L 70,18 L 76,6  L 82,18
      L 88,4  L 94,18 L 100,8 L 104,22
      L 104,30 L 52,30 Z
    " fill="#555" stroke="black" stroke-width="1.5" stroke-linejoin="miter"/>
    <!-- Crown jewel — red gem in centre -->
    <polygon points="78,8 74,16 78,13 82,16" fill="#cc0000" stroke="#ff4444" stroke-width="0.8"/>

    <!-- ══════════════════════════════════════
         FRONT ARM
         ══════════════════════════════════════ -->
    <line x1="46"  y1="112" x2="36"  y2="162" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="46"  y1="112" x2="36"  y2="162" stroke="#666"  stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <line x1="36"  y1="162" x2="41"  y2="232" stroke="black" stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="36"  y1="162" x2="41"  y2="232" stroke="#666"  stroke-width="4"   stroke-linecap="round" fill="none"/>
    <ellipse cx="41" cy="243" rx="8" ry="10" fill="#555" stroke="black" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════
         FRONT LEG
         ══════════════════════════════════════ -->
    <line x1="66"  y1="262" x2="67"  y2="326" stroke="black" stroke-width="11"  stroke-linecap="round" fill="none"/>
    <line x1="66"  y1="262" x2="67"  y2="326" stroke="#666"  stroke-width="7"   stroke-linecap="round" fill="none"/>
    <line x1="67"  y1="326" x2="66"  y2="390" stroke="black" stroke-width="9"   stroke-linecap="round" fill="none"/>
    <line x1="67"  y1="326" x2="66"  y2="390" stroke="#666"  stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M 73,389 L 59,389 C 53,389 51,400 57,410 C 63,413 71,411 76,407 C 78,403 76,394 73,389 Z"/>

    <!-- ══════════════════════════════════════
         JOINT KNOBS
         ══════════════════════════════════════ -->
    <circle cx="110" cy="112" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="46"  cy="112" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="122" cy="162" r="6"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="36"  cy="162" r="6"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="90"  cy="262" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="66"  cy="262" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="89"  cy="326" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>
    <circle cx="67"  cy="326" r="7"  fill="#555" stroke="black" stroke-width="1.5"/>

  </g>

</svg>
